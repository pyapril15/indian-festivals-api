services:
  - type: web
    name: indian-festivals-api
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: uv sync --frozen --no-dev
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - fromGroup: indian-festivals-api-secrets
    healthCheckPath: /health